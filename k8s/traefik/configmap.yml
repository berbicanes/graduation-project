apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic-config
  namespace: healthcare
data:
  routes.yml: |
    http:
      middlewares:
        auth-forward:
          forwardAuth:
            address: "http://auth.healthcare.svc.cluster.local:8000/auth/verify"
            authResponseHeaders:
              - X-User-Id
              - X-User-Role
              - X-User-Email

        rate-limit-auth:
          rateLimit:
            average: 100
            period: 1m
            burst: 20

      routers:
        auth-public:
          rule: "PathPrefix(`/auth/register`) || PathPrefix(`/auth/login`)"
          entryPoints:
            - web
          middlewares:
            - rate-limit-auth
          service: auth-service
          priority: 20

        auth-protected:
          rule: "PathPrefix(`/auth`)"
          entryPoints:
            - web
          middlewares:
            - rate-limit-auth
          service: auth-service
          priority: 10

        patients:
          rule: "PathPrefix(`/patients`)"
          entryPoints:
            - web
          middlewares:
            - auth-forward
          service: patient-service

        appointments:
          rule: "PathPrefix(`/appointments`)"
          entryPoints:
            - web
          middlewares:
            - auth-forward
          service: appointment-service

        notes:
          rule: "PathPrefix(`/notes`)"
          entryPoints:
            - web
          middlewares:
            - auth-forward
          service: clinical-notes-service

        invoices:
          rule: "PathPrefix(`/invoices`) || PathPrefix(`/billing`)"
          entryPoints:
            - web
          middlewares:
            - auth-forward
          service: billing-service

      services:
        auth-service:
          loadBalancer:
            servers:
              - url: "http://auth.healthcare.svc.cluster.local:8000"

        patient-service:
          loadBalancer:
            servers:
              - url: "http://patient.healthcare.svc.cluster.local:8000"

        appointment-service:
          loadBalancer:
            servers:
              - url: "http://appointment.healthcare.svc.cluster.local:8000"

        clinical-notes-service:
          loadBalancer:
            servers:
              - url: "http://clinical-notes.healthcare.svc.cluster.local:8000"

        billing-service:
          loadBalancer:
            servers:
              - url: "http://billing.healthcare.svc.cluster.local:8000"
