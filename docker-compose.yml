services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare_secret
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

  rabbitmq:
    image: docker.io/library/rabbitmq:3-management
    user: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "healthcare-dev-cookie"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - healthcare-net

  auth:
    build:
      context: ./services/auth
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare:healthcare_secret@postgres:5432/auth_db
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

  patient:
    build:
      context: ./services/patient
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare:healthcare_secret@postgres:5432/patient_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

  appointment:
    build:
      context: ./services/appointment
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare:healthcare_secret@postgres:5432/appointment_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

  clinical-notes:
    build:
      context: ./services/clinical-notes
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare:healthcare_secret@postgres:5432/clinical_notes_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

  billing:
    build:
      context: ./services/billing
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare:healthcare_secret@postgres:5432/billing_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  healthcare-net:
    driver: bridge
